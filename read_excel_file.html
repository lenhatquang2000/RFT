<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Excel File Reader</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
input {
  padding: 10px;
  font-size: 14px;
  margin-bottom: 20px;
  display: block;
}
h1 { color: #333; }
h2 { color: #666; margin-top: 30px; border-bottom: 2px solid #0066cc; padding-bottom: 10px; }
.sheet-info {
  background: #f9f9f9;
  padding: 15px;
  margin: 15px 0;
  border-left: 4px solid #0066cc;
  border-radius: 4px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin: 15px 0;
  font-size: 13px;
}
table th {
  background: #0066cc;
  color: white;
  padding: 10px;
  text-align: left;
  font-weight: bold;
}
table td {
  border: 1px solid #ddd;
  padding: 8px;
}
table tr:nth-child(even) {
  background: #f9f9f9;
}
.error {
  color: #d32f2f;
  background: #ffebee;
  padding: 15px;
  border-radius: 4px;
  margin: 15px 0;
}
.success {
  color: #388e3c;
  background: #e8f5e9;
  padding: 15px;
  border-radius: 4px;
  margin: 15px 0;
}
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin: 20px 0;
}
.summary-card {
  background: #f0f7ff;
  border: 1px solid #0066cc;
  padding: 15px;
  border-radius: 4px;
}
.summary-card h3 {
  margin: 0 0 10px 0;
  color: #0066cc;
  font-size: 12px;
}
.summary-card p {
  margin: 0;
  font-size: 18px;
  font-weight: bold;
  color: #333;
}
</style>
</head>
<body>

<div class="container">
  <h1>📊 Excel File Reader</h1>
  
  <div>
    <label for="fileInput">Chọn file Excel:</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
  </div>
  
  <div id="result"></div>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  
  reader.onload = function(event) {
    try {
      const data = event.target.result;
      const workbook = XLSX.read(data, { type: 'binary' });
      
      let html = '<div class="success">✅ File đã được đọc thành công</div>';
      
      // Hiển thị tóm tắt
      html += '<div class="summary">';
      html += '<div class="summary-card"><h3>Số Sheet</h3><p>' + workbook.SheetNames.length + '</p></div>';
      html += '<div class="summary-card"><h3>File Name</h3><p>' + file.name + '</p></div>';
      html += '<div class="summary-card"><h3>File Size</h3><p>' + (file.size / 1024).toFixed(2) + ' KB</p></div>';
      html += '</div>';
      
      // Chi tiết từng sheet
      workbook.SheetNames.forEach((sheetName, idx) => {
        const worksheet = workbook.Sheets[sheetName];
        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
        
        html += '<h2>Sheet ' + (idx + 1) + ': ' + sheetName + '</h2>';
        html += '<div class="sheet-info">';
        html += '<strong>Số dòng:</strong> ' + jsonData.length + '<br>';
        html += '<strong>Số cột:</strong> ' + (jsonData.length > 0 ? Object.keys(jsonData[0]).length : 0) + '<br>';
        html += '<strong>Cột:</strong> ' + (jsonData.length > 0 ? Object.keys(jsonData[0]).join(', ') : 'N/A');
        html += '</div>';
        
        // Hiển thị dữ liệu
        if (jsonData.length > 0) {
          html += '<table>';
          
          // Header
          html += '<thead><tr>';
          Object.keys(jsonData[0]).forEach(key => {
            html += '<th>' + key + '</th>';
          });
          html += '</tr></thead>';
          
          // Data (tối đa 20 dòng)
          html += '<tbody>';
          const maxRows = Math.min(jsonData.length, 20);
          for (let i = 0; i < maxRows; i++) {
            html += '<tr>';
            Object.keys(jsonData[0]).forEach(key => {
              let value = jsonData[i][key];
              if (typeof value === 'object') {
                value = JSON.stringify(value);
              }
              html += '<td>' + (value || '') + '</td>';
            });
            html += '</tr>';
          }
          html += '</tbody>';
          html += '</table>';
          
          if (jsonData.length > 20) {
            html += '<p style="color: #666; font-style: italic;">... và ' + (jsonData.length - 20) + ' dòng khác</p>';
          }
        } else {
          html += '<p style="color: #999;">Sheet này không có dữ liệu</p>';
        }
      });
      
      document.getElementById('result').innerHTML = html;
    } catch (error) {
      document.getElementById('result').innerHTML = '<div class="error">❌ Lỗi đọc file: ' + error.message + '</div>';
    }
  };
  
  reader.readAsBinaryString(file);
});
</script>

</body>
</html>
